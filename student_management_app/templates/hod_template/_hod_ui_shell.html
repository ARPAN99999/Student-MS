<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --hod-sky: #0ea5e9;
    --hod-sky-dark: #0284c7;
    --hod-navy: #0c1a2e;
    --hod-ink: #1e293b;
    --hod-muted: #64748b;
    --hod-stroke: #e2e8f0;
    --hod-bg: #f0f6ff;
    --hod-surface: #ffffff;
  }

  body {
    background: var(--hod-bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--hod-ink);
  }

  .hod-nav-shell {
    background: var(--hod-navy);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .hod-brand {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    color: #fff;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .hod-brand span {
    background: var(--hod-sky);
    color: #fff;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 999px;
    padding: 2px 8px;
  }

  .hod-nav-links {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .hod-nav-links a {
    color: rgba(255, 255, 255, 0.76);
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 8px;
    transition: 0.2s ease;
  }

  .hod-nav-links a:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.1);
  }

  .hod-logout-link {
    background: var(--hod-sky);
    color: #fff !important;
  }

  .hod-logout-link:hover {
    background: var(--hod-sky-dark) !important;
  }

  .container.mt-4,
  .container.mt-4.mb-5 {
    margin-top: 24px !important;
  }

  .container h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    margin-bottom: 14px;
    color: #0f172a;
  }

  .card {
    border: 1px solid var(--hod-stroke);
    border-radius: 14px;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
  }

  .table {
    background: var(--hod-surface);
  }

  .btn-primary {
    border: none;
    background: linear-gradient(135deg, var(--hod-sky), var(--hod-sky-dark));
  }

  .btn-primary:hover {
    filter: brightness(0.95);
  }

  @media (max-width: 992px) {
    .hod-nav-shell {
      flex-direction: column;
      align-items: flex-start;
      padding: 12px 14px;
      gap: 10px;
    }

    .hod-nav-links {
      width: 100%;
    }
  }
</style>

<nav class="hod-nav-shell">
  <a class="hod-brand" href="{% url 'admin_home' %}">StudentMS <span>HOD</span></a>
  <div class="hod-nav-links">
    <a href="{% url 'admin_home' %}">Dashboard</a>
    <a href="{% url 'manage_staff' %}">Staff</a>
    <a href="{% url 'manage_course' %}">Courses</a>
    <a href="{% url 'manage_student' %}">Students</a>
    <a href="{% url 'manage_subject' %}">Subjects</a>
    <a href="{% url 'manage_session' %}">Sessions</a>
    <a href="{% url 'student_feedback_message' %}">Feedback</a>
    <a href="{% url 'student_leave_view' %}">Leaves</a>
    <a href="{% url 'admin_view_attendance' %}">Attendance</a>
    <a href="{% url 'admin_profile' %}">Profile</a>
    <a class="hod-logout-link" href="{% url 'logout_user' %}">Logout</a>
  </div>
</nav>
