{% extends 'base.html' %}

{% block content %}
{% include 'hod_template/_hod_ui_shell.html' %}
<div class="container mt-4 mb-5">
  <h3>Edit Staff</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST" action="{% url 'edit_staff_save' %}" class="card p-3">
    {% csrf_token %}
    <input type="hidden" name="staff_id" value="{{ id }}">

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>First Name</label>
        <input type="text" name="first_name" class="form-control" value="{{ staff.admin.first_name }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>Last Name</label>
        <input type="text" name="last_name" class="form-control" value="{{ staff.admin.last_name }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" value="{{ staff.admin.username }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" value="{{ staff.admin.email }}" required>
      </div>
      <div class="col-md-12 mb-3">
        <label>Address</label>
        <input type="text" name="address" class="form-control" value="{{ staff.address }}" required>
      </div>
    </div>

    <div>
      <button type="submit" class="btn btn-primary">Update Staff</button>
      <a href="{% url 'manage_staff' %}" class="btn btn-secondary">Back</a>
    </div>
  </form>
</div>
{% endblock content %}
