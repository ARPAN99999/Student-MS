{% extends 'base.html' %}

{% block content %}
{% include 'hod_template/_hod_ui_shell.html' %}
<div class="container mt-4 mb-5">
  <h3>Edit Course</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST" action="{% url 'edit_course_save' %}" class="card p-3">
    {% csrf_token %}
    <input type="hidden" name="course_id" value="{{ id }}">

    <div class="mb-3">
      <label>Course Name</label>
      <input type="text" name="course" class="form-control" value="{{ course.course_name }}" required>
    </div>

    <div>
      <button type="submit" class="btn btn-primary">Update Course</button>
      <a href="{% url 'manage_course' %}" class="btn btn-secondary">Back</a>
    </div>
  </form>
</div>
{% endblock content %}
