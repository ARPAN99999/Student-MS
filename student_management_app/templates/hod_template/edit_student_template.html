{% extends 'base.html' %}

{% block content %}
{% include 'hod_template/_hod_ui_shell.html' %}
<div class="container mt-4 mb-5">
  <h3>Edit Student</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST" action="{% url 'edit_student_save' %}" enctype="multipart/form-data" class="card p-3">
    {% csrf_token %}
    {{ form.as_p }}
    <div>
      <button type="submit" class="btn btn-primary">Update Student</button>
      <a href="{% url 'manage_student' %}" class="btn btn-secondary">Back</a>
    </div>
  </form>
</div>
{% endblock content %}
